version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: traffic_db
    environment:
      POSTGRES_DB: traffic_violations
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_violations"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: traffic_app
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://traffic_user:traffic_pass@db:5432/traffic_violations
      SECRET_KEY: change-this-in-production-please
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/evidence_files
    volumes:
      - evidence_data:/app/evidence_files
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  evidence_data:
